<svg xmlns="http://www.w3.org/2000/svg" width="512" height="512" viewBox="0 0 512 512" fill="none">
  <!-- Light earthy background circle -->
  <circle cx="256" cy="256" r="240" fill="#f8f1e3" stroke="#5f452a" stroke-width="32"/>
  
  <!-- Main green map pin circle (head) -->
  <circle cx="256" cy="175" r="105" fill="#02874d"/>
  
  <!-- Pin tail -->
  <path d="M256 280 L185 420 L327 420 Z" fill="#02874d"/>
  
  <!-- Geocache box inside pin head -->
  <rect x="186" y="115" width="140" height="95" rx="14" fill="#f4e9d8" stroke="#5f452a" stroke-width="14"/>
  
  <!-- Lid line on cache -->
  <line x1="200" y1="145" x2="312" y2="145" stroke="#5f452a" stroke-width="10" stroke-linecap="round"/>
  
  <!-- GC text inside cache -->
  <text x="256" y="182" font-family="Arial, Helvetica, sans-serif" font-size="52" font-weight="900" fill="#02874d" text-anchor="middle" dominant-baseline="middle">GC</text>
  
  <!-- Small center dot for location marker -->
  <circle cx="256" cy="220" r="16" fill="#02874d"/>
</svg>